<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>NabNote</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-title">NabNote</span>
    <div class="titlebar-controls">
      <button class="titlebar-btn btn-minimize" id="btn-minimize">&#x2014;</button>
      <button class="titlebar-btn btn-close" id="btn-close">&#x2715;</button>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="note-input" placeholder="有什么想记的？回车保存" autocomplete="off" />
  </div>

  <div class="search-area">
    <input type="text" id="search-input" placeholder="搜索笔记..." autocomplete="off" />
  </div>

  <div class="notes-list" id="notes-list">
  </div>

  <div class="statusbar" id="statusbar">
    共 0 条笔记 · 已完成 0 条
  </div>

  <script src="app.js"></script>
</body>
</html>
