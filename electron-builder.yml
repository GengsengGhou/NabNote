appId: com.gengsengghou.nabnote
productName: NabNote
directories:
  output: dist
files:
  - "**/*"
  - "!node_modules/.cache"
  - "!dist"
  - "!dist-*"
  - "!data"
  - "!debug.txt"
  - "!test-electron.js"
  - "!test-spawn.js"
  - "!generate-icons.js"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target: dmg
  icon: assets/icon.png
linux:
  target: AppImage
  icon: assets/icon.png
